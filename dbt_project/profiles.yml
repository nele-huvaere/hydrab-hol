hydrab_fleet:
  target: prod
  outputs:
    prod:
      type: snowflake
      account: '{{ env_var("SNOWFLAKE_ACCOUNT", "not_needed") }}'
      user: '{{ env_var("SNOWFLAKE_USER", "not_needed") }}'
      role: ACCOUNTADMIN
      database: '{{ env_var("SNOWFLAKE_DATABASE", "HYDRAB_HOL") }}'
      schema: GOLD
      warehouse: HYDRAB_HOL_WH
      threads: 4
